server:
  port: 8080

spring:
  application:
    name: dimension-audit-engine
  jackson:
    default-property-inclusion: always
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Application-specific settings
dimension-audit:
  default-tolerance-percentage: 0.5
  major-severity-threshold: 2.0
  critical-severity-threshold: 5.0

logging:
  level:
    com.archintel.dimension: INFO
    org.springframework.web: WARN