# =============================================================================
# Nginx configuration for Architectural Intelligence System Frontend
# - Serves static React SPA
# - Proxies API calls to backend microservices
# - SSE stream support with buffering disabled
# =============================================================================

# Use Docker's internal DNS resolver for dynamic upstream resolution
resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Cache static assets aggressively (Vite adds content hashes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SSE stream endpoint — must disable ALL buffering
    location ~ ^/api/v1/jobs/[^/]+/stream$ {
        set $ingestion_upstream http://file-ingestion:8001;
        proxy_pass $ingestion_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_http_version 1.1;

        # Disable ALL buffering for SSE — critical for real-time events
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 360s;
        chunked_transfer_encoding off;

        # SSE-specific headers
        add_header X-Accel-Buffering no always;
        add_header Cache-Control 'no-cache' always;
    }

    # Proxy audit API calls to dimension-audit service (Java Spring Boot)
    location /api/v1/audit/ {
        set $audit_upstream http://dimension-audit:8080;
        proxy_pass $audit_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_intercept_errors on;
        error_page 502 503 504 = /api-error.json;
    }

    # Proxy all other /api/v1/ calls to file-ingestion service (Python)
    location /api/v1/ {
        set $ingestion_upstream http://file-ingestion:8001;
        proxy_pass $ingestion_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 100M;
        proxy_intercept_errors on;
        error_page 502 503 504 = /api-error.json;
    }

    # API error fallback JSON
    location = /api-error.json {
        internal;
        default_type application/json;
        return 503 '{"error":"Backend service unavailable","status":503}';
    }

    # SPA fallback: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"frontend-visualizer"}';
    }
}